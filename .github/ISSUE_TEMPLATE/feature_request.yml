name: "✨ Feature Request"
description: "Suggest an idea for this project."
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a feature! This helps us make AMRIT better.

  - type: dropdown
    id: component
    attributes:
      label: Which component would this feature be for?
      description: Select the relevant AMRIT repository/module.
      options:
        - "AMRIT Hub (This Repo)"
        - "AMRIT-Docs"
        - "Common-UI / Common-API"
        - "Inventory-UI / Inventory-API"
        - "MMU-UI / MMU-API"
        - "TM-UI / TM-API"
        - "HWC-UI / HWC-API"
        - "ADMIN-UI / Admin-API"
        - "Scheduler-UI / Scheduler-API / HWC-Scheduler-UI"
        - "ECD-UI / ECD-API"
        - "Helpline (1097 / 104) UI / API"
        - "Identity-API / BeneficiaryID-Generation-API"
        - "FHIR-API"
        - "Mobile Apps (FLW / HWC)"
        - "Other / Not Sure"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem? Please describe.
      description: A clear and concise description of what the problem is. Ex. I'm always frustrated when [...]
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or features you've considered.
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Add any other context or screenshots about the feature request here.
    validations:
      required: false
